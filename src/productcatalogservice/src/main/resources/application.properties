server.port=${PORT:3550}
spring.application.name=productcatalogservice
mongo.addr=${MONGO_ADDR:mongodb://mongo-productcatalog:27017}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,prometheus
management.prometheus.metrics.export.enabled=true

# HTTP server latency histogram
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.sla.http.server.requests=50ms,100ms,250ms,500ms,1s,2s
