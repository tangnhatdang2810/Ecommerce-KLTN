apiVersion: apps/v1
kind: Deployment
metadata:
  name: shippingservice
  namespace: app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: shippingservice
  template:
    metadata:
      labels:
        app: shippingservice
    spec:
      containers:
        - name: shippingservice
          image: tangnhatdang/ecommerce-kltn-shippingservice:cd84b44
          ports:
            - containerPort: 50051
          env:
            - name: PORT
              value: "50051"
            - name: MONGO_ADDR
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: MONGO_ADDR
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 50051
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 50051
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: shippingservice
  namespace: app
  labels:
    app: spring-service
spec:
  selector:
    app: shippingservice
  ports:
    - name: http
      port: 50051
      targetPort: 50051
  type: ClusterIP
