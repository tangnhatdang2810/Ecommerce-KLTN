apiVersion: apps/v1
kind: Deployment
metadata:
  name: productcatalogservice
  namespace: app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: productcatalogservice
  template:
    metadata:
      labels:
        app: productcatalogservice
    spec:
      containers:
        - name: productcatalogservice
          image: tangnhatdang/ecommerce-kltn-productcatalogservice:7498650
          ports:
            - containerPort: 3550
          env:
            - name: PORT
              value: "3550"
            - name: MONGO_ADDR
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: MONGO_ADDR
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 3550
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 3550
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: productcatalogservice
  namespace: app
  labels:
    app: spring-service
spec:
  selector:
    app: productcatalogservice
  ports:
    - name: http
      port: 3550
      targetPort: 3550
  type: ClusterIP
