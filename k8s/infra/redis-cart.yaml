apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-cart-pvc
  namespace: infra
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cart
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-cart
  template:
    metadata:
      labels:
        app: redis-cart
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-cart-data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
      volumes:
        - name: redis-cart-data
          persistentVolumeClaim:
            claimName: redis-cart-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cart
  namespace: infra
spec:
  selector:
    app: redis-cart
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
