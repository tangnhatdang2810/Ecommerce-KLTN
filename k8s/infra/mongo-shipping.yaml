apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-shipping-pvc
  namespace: infra
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-shipping
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-shipping
  template:
    metadata:
      labels:
        app: mongo-shipping
    spec:
      containers:
        - name: mongo
          image: mongo:latest
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-shipping-data
              mountPath: /data/db
          readinessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
      volumes:
        - name: mongo-shipping-data
          persistentVolumeClaim:
            claimName: mongo-shipping-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-shipping
  namespace: infra
spec:
  selector:
    app: mongo-shipping
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP
