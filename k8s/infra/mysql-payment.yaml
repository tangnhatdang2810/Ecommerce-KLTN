apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-payment-pvc
  namespace: infra
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-payment
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-payment
  template:
    metadata:
      labels:
        app: mysql-payment
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "rootpassword"
            - name: MYSQL_DATABASE
              value: "paymentdb"
            - name: MYSQL_USER
              value: "paymentuser"
            - name: MYSQL_PASSWORD
              value: "paymentpassword"
          volumeMounts:
            - name: mysql-payment-data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
      volumes:
        - name: mysql-payment-data
          persistentVolumeClaim:
            claimName: mysql-payment-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-payment
  namespace: infra
spec:
  selector:
    app: mysql-payment
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP
