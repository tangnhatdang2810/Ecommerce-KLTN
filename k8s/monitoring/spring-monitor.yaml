apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: spring-services
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - app
  selector:
    matchLabels:
      app: spring-service
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
