---
# ================================================================
# DRL Autoscaler - 1 Pod scale 3 services tuần tự
# Model: ppo_single_best.zip (train từ productcatalog data)
# Scaler: scaler_single.pkl (6 features)
# ================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drl-autoscaler
  namespace: app
  labels:
    app: drl-autoscaler
spec:
  replicas: 1  # 1 pod duy nhất - tránh conflict khi scale
  selector:
    matchLabels:
      app: drl-autoscaler
  template:
    metadata:
      labels:
        app: drl-autoscaler
    spec:
      serviceAccountName: drl-autoscaler-sa
      restartPolicy: Always

      containers:
        - name: autoscaler
          image: tangnhatdang/ecommerce-kltn-autoscaler:b801b3d
          imagePullPolicy: Always

          env:
            - name: PROMETHEUS_URL
              value: "http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090"
            - name: TARGET_NAMESPACE
              value: "app"
            - name: SCALE_INTERVAL
              value: "15"
            - name: MODEL_PATH
              value: "/app/models/ppo_single_best.zip"
            - name: SCALER_PATH
              value: "/app/models/scaler_single.pkl"
            - name: DRY_RUN
              value: "false"

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import os; open('/app/agent.py')"
            initialDelaySeconds: 30
            periodSeconds: 30

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000