---
# DRL Autoscaler Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drl-autoscaler
  namespace: app
  labels:
    app: drl-autoscaler
spec:
  revisionHistoryLimit: 3
  replicas: 1  # Only 1 instance to avoid scaling conflicts
  selector:
    matchLabels:
      app: drl-autoscaler
  template:
    metadata:
      labels:
        app: drl-autoscaler
    spec:
      serviceAccountName: drl-autoscaler-sa
      restartPolicy: Always

      containers:
        - name: autoscaler
          # Update tag as needed during CI/CD
          image: tangnhatdang/ecommerce-kltn-autoscaler:35f0e98
          imagePullPolicy: Always

          env:
            # Prometheus URL (in-cluster)
            - name: PROMETHEUS_URL
              value: "http://prometheus-server.monitoring.svc.cluster.local"
            
            # Kubernetes namespace where services are deployed
            - name: TARGET_NAMESPACE
              value: "app"
            
            # Scaling interval in seconds
            - name: SCALE_INTERVAL
              value: "15"
            
            # Model path inside container
            - name: MODEL_PATH
              value: "/app/models/ppo_model_best.zip"
            
            # Scaler path inside container
            - name: SCALER_PATH
              value: "/app/models/scaler.pkl"
            
            # Set to "true" for dry-run mode (logs actions but doesn't scale)
            - name: DRY_RUN
              value: "false"

          # Resource limits
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # Health check
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - ps aux | grep -q "[a]gent.py"
            initialDelaySeconds: 30
            periodSeconds: 30

          # Logging
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000

