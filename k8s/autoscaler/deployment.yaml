---
# Autoscaler for apigateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rl-autoscaler-apigateway
  namespace: app
  labels:
    app: rl-autoscaler
    target: apigateway
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: rl-autoscaler
      target: apigateway
  template:
    metadata:
      labels:
        app: rl-autoscaler
        target: apigateway
    spec:
      serviceAccountName: rl-autoscaler
      restartPolicy: Always

      containers:
        - name: autoscaler
          image: tangnhatdang/ecommerce-kltn-autoscaler:80ba9f0
          imagePullPolicy: Always

          env:
            # Target deployment to scale
            - name: TARGET_DEPLOYMENT
              value: "apigateway"
            - name: TARGET_SERVICE
              value: "apigateway"

            # Algorithm: ppo or a2c
            - name: ALGO
              value: "ppo"

            # Prometheus URL
            - name: PROM_URL
              value: "http://prometheus:9090"

            # Logging level
            - name: LOG_LEVEL
              value: "INFO"

          # Resource limits
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # Volume mounts for models
          volumeMounts:
            - name: models
              mountPath: /app/models

      # Volumes
      volumes:
        - name: models
          emptyDir: {}

