---
# Centralized Multi-Service RL Autoscaler
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rl-autoscaler
  namespace: app
  labels:
    app: rl-autoscaler
    version: centralized
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: rl-autoscaler
  template:
    metadata:
      labels:
        app: rl-autoscaler
    spec:
      serviceAccountName: rl-autoscaler
      restartPolicy: Always

      containers:
        - name: autoscaler
          image: tangnhatdang/ecommerce-kltn-autoscaler:6e2f6a8
          imagePullPolicy: Always

          env:
            # Algorithm: ppo or a2c
            - name: ALGO
              value: "ppo"

            # Prometheus URL (cross-namespace: monitoring-kube-prometheus-prometheus.monitoring)
            - name: PROM_URL
              value: "http://monitoring-kube-prometheus-prometheus.monitoring:9090"

            # Logging level
            - name: LOG_LEVEL
              value: "INFO"

          # Resource limits
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
