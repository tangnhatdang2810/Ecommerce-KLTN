---
# ServiceAccount for DRL Autoscaler
apiVersion: v1
kind: ServiceAccount
metadata:
  name: drl-autoscaler-sa
  namespace: app

---
# Role for DRL Autoscaler (minimal permissions)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: drl-autoscaler-role
  namespace: app
rules:
  # Query deployment status
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  
  # Scale deployments
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]

---
# RoleBinding for DRL Autoscaler
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: drl-autoscaler-rolebinding
  namespace: app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: drl-autoscaler-role
subjects:
  - kind: ServiceAccount
    name: drl-autoscaler-sa
    namespace: app
